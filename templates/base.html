<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titel %}Passantenfrequenzen Bielefeld{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="kopf">
    <div class="inhalt">
      <h1><a href="{{ url_for('index') }}">Passantenfrequenzen Bielefelder Innenstadt</a></h1>
      <p class="untertitel">Offene Messdaten der Passantenfrequenzmessung — täglich aktualisiert</p>
    </div>
  </header>
  <main class="inhalt">
    {% block inhalt %}{% endblock %}
  </main>
  <footer class="fuss inhalt">
    <p>Bereitgestellt von Stadt Bielefeld / WEGE mbH anlässlich einer Anfrage nach dem
       Informationsfreiheitsgesetz NRW. <a href="{{ url_for('datenqualitaet') }}">Datenqualitätsbericht</a></p>
  </footer>
</body>
</html>
